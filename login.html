<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vishflix Login</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>
   

<div class="background">

    <nav>

        <img src="images/logo.png" class="logo" alt="Vishflix Logo">

    </nav>

    <div class="login-box">

        <h1>Sign In</h1>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email or mobile number"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Sign In
            </button>

            <div class="remember">

                <label>

                    <input type="checkbox">

                    Remember me

                </label>

                <a href="#">Need help?</a>

            </div>

        </form>

        <p class="signup">

            New here?

            <a href="signup.html">Sign up now.</a>

        </p>

        

    </div>

</div>
 <p style="text-align:center;color:#aaa;margin-top:15px;">
This is an educational project using the TMDB API.
It is not affiliated with Netflix.
</p>
<script src="js/login.js"></script>

</body>

</html>

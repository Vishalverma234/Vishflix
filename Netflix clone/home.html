<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Netflix Home</title>

    <link rel="stylesheet" href="css/home.css">

</head>

<body>

<nav>

    <img src="images/logo.png" class="logo">

    <div class="right">

        <span id="userEmail"></span>

        <button id="logoutBtn">Logout</button>

    </div>

</nav>
<div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Movies..."
    >

    <button id="searchBtn">🔍</button>

</div>

<section class="welcome">

    <h1>Welcome Back 👋</h1>

    <p>Enjoy your favourite movies and TV shows.</p>

</section>
 <h2>Search Results</h2>

    <div id="searchResults" class="movie-row"></div>
<section class="movies">

    <h2>Trending Now</h2>

    <div class="movie-row" id="trendingMovies"></div>

</section>

<section class="movies">

    <h2>Popular</h2>

    <div class="movie-row" id="popularMovies"></div>

</section>

<section class="movies">

    <h2>Top Rated</h2>

    <div class="movie-row" id="topRatedMovies"></div>

</section>
<section class="hero-banner">

    <div class="banner-content">

        <h1>Stranger Things</h1>

        <p>
            When a young boy disappears, his mother,
            a police chief and his friends confront
            terrifying supernatural forces.
        </p>

        <div class="banner-buttons">

            <button class="play-btn">▶ Play</button>

            <button class="info-btn">More Info</button>

        </div>

    </div>

</section>


<div id="movieModal" class="modal">

    <div class="modal-content">

        <span id="closeModal">&times;</span>

        <img id="modalPoster">

        <div class="modal-info">

            <h2 id="modalTitle"></h2>

            <p><strong>⭐ Rating:</strong> <span id="modalRating"></span></p>

            <p><strong>📅 Release:</strong> <span id="modalRelease"></span></p>

            <p id="modalOverview"></p>

        </div>

    </div>

</div>
<script src="js/home.js"></script>
</body>
</html>
